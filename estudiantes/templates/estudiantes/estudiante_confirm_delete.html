{% extends "estudiantes/base.html" %}

{% block title %}Eliminar estudiante{% endblock %}

{% block content %}
<div class="page-head">
    <div>
        <h1>Eliminar estudiante</h1>
        <p>Esta acción no se puede deshacer</p>
    </div>
</div>

<div class="card2 card2-pad" style="max-width:520px">
    <p style="margin:0 0 20px">
        ¿Seguro que deseas eliminar a <strong>{{ object }}</strong>?
    </p>
    <form method="post">
        {% csrf_token %}
        <div class="form-actions">
            <button type="submit" class="btn2 btn2-danger">Sí, eliminar</button>
            <a href="{% url 'estudiantes:lista' %}" class="btn2 btn2-ghost">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
