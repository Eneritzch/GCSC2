{% extends "estudiantes/base.html" %}

{% block title %}Eliminar estudiante{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="card border-danger shadow-sm">
            <div class="card-body">
                <h1 class="h4 text-danger mb-3">Confirmar eliminación</h1>
                <p>
                    ¿Estás seguro de que deseas eliminar al estudiante
                    <strong>{{ object }}</strong>? Esta acción no se puede deshacer.
                </p>
                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-danger">
                            Sí, eliminar
                        </button>
                        <a href="{% url 'estudiantes:lista' %}" class="btn btn-outline-secondary">
                            Cancelar
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
